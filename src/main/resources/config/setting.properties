environment.terrain.visibility.reduced=0.4
environment.terrain.visibility.normal=1.0
environment.terrain.tileSize=50.0

# ============================================================

# ============================================================
environment.meat.expiryTicks=30
environment.light.day=1.0
environment.light.night=0.2

environment.time.ticksPerDayCycle=24
environment.time.ticksPerSeason=240
# ============================================================
# Khi hau - Nhiet do & Do am theo mua (TimeComponent)
# baseTemp: Nhiet do trung binh cua mua (C)
# tempAmplitude: Bien do dao dong ngay-dem (C). Nhiet do thuc = baseTemp +/- amplitude
# humidity: Do am co ban cua mua (%)
# ============================================================
environment.climate.normal.baseTemp=20.0
environment.climate.normal.tempAmplitude=6.0
environment.climate.normal.humidity=50.0

environment.climate.breeding.baseTemp=25.0
environment.climate.breeding.tempAmplitude=5.0
environment.climate.breeding.humidity=65.0

environment.climate.drought.baseTemp=38.0
environment.climate.drought.tempAmplitude=8.0
environment.climate.drought.humidity=20.0

# Anh huong cua thoi tiet len nhiet do (cong/tru vao nhiet do hien tai)
environment.climate.weather.rain.tempDelta=-4.0
environment.climate.weather.rain.humidity=95.0
environment.climate.weather.drought.tempDelta=3.0
environment.climate.weather.drought.humidity=10.0

# Transition speed for environmental indices (0.0 to 1.0)
environment.transition.temperature=0.05
environment.transition.humidity=0.05
environment.transition.lightLevel=0.10

# ============================================================
#  WILDLIFE ECO SIMULATION  —  Bang cau hinh
# ------------------------------------------------------------
#  QUY UOC DON VI:
#   - Doi/Khat: thang 0..100 (0 = no/du nuoc, 100 = doi la/khat kiet)
#   - hungerDecay / thirstDecay: muc doi/khat TANG them moi tick
#   - HP, nutrition: diem tuyet doi   |   Nhiet do: do C
#   - light / visibility: 0..1        |   do am: 0..100
#   - *.chance: xac suat moi tick (0..1)
#  LUU Y: file .properties KHONG cho phep ghi chu cung dong voi gia tri
#         -> moi chu thich phai o dong rieng, bat dau bang '#'.
# ============================================================


# ============================================================
#  1. HANG SO CHUNG CHO MOI SINH VAT  (Organism / SurvivalStats)
# ============================================================
# HP tru moi tick khi buoc vao giai doan lao hoa
organism.growth.decayHpPenalty=0.5
# HP hao hut co ban moi tick (trao doi chat nen)
organism.stats.baseHpDrainPerTick=0.1
# He so: moi truong cang kho (do am thap) thi cang nhanh khat
organism.stats.thirstHumidityFactor=0.5
# HP phat them khi nhiet do GAY CHET / nam ngoai vung chiu dung
organism.stats.lethalStressHpPenalty=3.0
# HP phat them khi nhiet do ngoai vung toi uu (nhung van chiu duoc)
organism.stats.suboptimalStressHpPenalty=0.5
# Nguong doi/khat (0..100) bat dau bi tru mau
organism.stats.hungerHpThreshold=80.0
organism.stats.thirstHpThreshold=85.0
# HP mat moi tick khi doi/khat da vuot nguong tren
organism.stats.hpPenaltyPerTick=2.0
# Ti le quy doi dinh duong an duoc -> HP hoi phuc
organism.stats.nutritionToHpRatio=0.3
# Do am toi da (mau so chuan hoa humidityFactor khi cay quang hop)
organism.stats.humidityMax=100.0
# So tick cho giua 2 lan phan khang cua ScaredStrategy (tranh spam moi tick)
organism.scared.counterAttackCooldown=20


# ============================================================
#  2. MOI TRUONG  (Environment)
# ============================================================

# --- 2.1 Thoi tiet & Mua (TimeComponent) ---
# Xac suat mua/han theo tung mua (xet moi lan doi thoi tiet)
environment.time.breeding.rainChance=0.40
environment.time.drought.droughtChance=0.60
# Mua han van co the co mua nhung rat hiem
environment.time.drought.rainChance=0.05
environment.time.normal.rainChance=0.15
environment.time.normal.droughtChance=0.10
# He so khac nghiet (>1 = doi/khat nhanh hon) theo mua va theo thoi tiet
environment.multiplier.season.breeding=0.8
environment.multiplier.season.drought=1.5
environment.multiplier.weather.rain=0.7
environment.multiplier.weather.drought=1.4
# Do dai chu ky (tick): 1 vong ngay-dem va 1 mua
environment.time.ticksPerDayCycle=24
environment.time.ticksPerSeason=240

# --- 2.2 Dia hinh (TerrainComponent) ---
# He so do nhan dien theo dia hinh (rung/nuoc thap = de an nau)
environment.terrain.visibility.reduced=0.8
environment.terrain.visibility.normal=1.0
# Kich thuoc 1 o luoi (toa do thuc chia tileSize -> chi so o)
environment.terrain.tileSize=50.0
# Toc do bi tru khi di qua dia hinh kho (bun, rung); Soi it bi phat trong rung
environment.terrain.penalty.shallow_water=2.0
environment.terrain.penalty.forest=1.5
environment.terrain.penalty.forest.wolf=0.5

# --- 2.3 Thoi tiet dac biet, anh sang & tai nguyen ---
# Khi mua: moi tick co xac suat thap sinh 1 o bun lay (MUD) o Dong co
environment.weather.rain.mudChance=0.05
# Cuong do anh sang ban ngay / ban dem
environment.light.day=1.0
environment.light.night=0.2
# So tick ton tai cua mot mieng thit (xac dong vat)
environment.meat.expiryTicks=30


# ============================================================
#  3. THUC AN  (FoodItem: gia tri dinh duong & so tick ton tai)
# ============================================================
food.meat.nutritionalValue=25.0
food.apple.nutritionalValue=5.0
food.water.nutritionalValue=20.0
food.algae.nutritionalValue=20.0
food.treeforest.nutritionalValue=7.0
food.apple.expiryTicks=100
food.algae.expiryTicks=90
food.treeforest.expiryTicks=80


# ============================================================
#  4. SINH SAN CHUNG
# ============================================================
# --- Dong vat (mac dinh; rieng Ca xem muc 5.6) ---
# Chi sinh khi doi & khat duoi nguong, qua cooldown, va trung 'chance'
animal.reproduce.hungerThreshold=70.0
animal.reproduce.thirstThreshold=70.0
animal.reproduce.chance=0.04
animal.reproduce.cooldownTicks=80
# Ban kinh dat con quanh con bo me
animal.reproduce.spawnRadius=15.0

# --- Thuc vat (cay khong co khai niem doi -> xet theo KHAT) ---
plant.reproduce.thirstThreshold=80.0
plant.reproduce.chance=0.01
plant.reproduce.offspringCount=1
plant.reproduce.spawnRadius=20.0

# --- Gam co (Rabbit/Deer/Elephant an Grass) ---
# Moi nhat gam: tru bao nhieu HP (sinh khoi) cua bui co, va nap bao nhieu dinh duong cho thu
# Co chet khi HP can; co moc lai nho sinh san -> nguon thuc an ben vung cho thu an co
animal.graze.biomassPerBite=12.0
animal.graze.nutritionPerBite=8.0


# ============================================================
#  5. DONG VAT (gom theo loai)
#  Moi loai gom 3 nhom khoa:
#   - song con: maxHp, nutrition (dinh duong cua xac), hungerDecay,
#               thirstDecay, maxAge, maxSize
#   - vat ly  : combatPower, vision, speed, eatRadius (ban kinh an/uong/danh)
#   - hanh vi : flee.* (chay tron) hoac hunt.* (di san)
# ============================================================

# --- 5.1 Tho (Rabbit) — an tao, nho con, doi/khat nhanh, tron Ho & Soi ---
animal.rabbit.maxHp=40.0
animal.rabbit.nutrition=35.0
animal.rabbit.hungerDecay=0.18
animal.rabbit.thirstDecay=0.25
animal.rabbit.maxAge=400.0
animal.rabbit.maxSize=5.0
animal.rabbit.combatPower=1.0
animal.rabbit.vision=100.0
animal.rabbit.speed=2.0
animal.rabbit.eatRadius=5.0
# Chay tron: he so toc do khi sprint, so buoc sprint moi tick
animal.rabbit.flee.speedMultiplier=1.5
animal.rabbit.flee.sprintSteps=2

# --- 5.2 Huou (Deer) — an tao, song dai hon tho, cho nhieu thit hon ---
animal.deer.maxHp=80.0
animal.deer.nutrition=35.0
animal.deer.hungerDecay=0.15
animal.deer.thirstDecay=0.20
animal.deer.maxAge=600.0
animal.deer.maxSize=12.0
animal.deer.combatPower=2.0
animal.deer.vision=120.0
animal.deer.speed=3.0
animal.deer.eatRadius=6.0
animal.deer.flee.speedMultiplier=1.4
animal.deer.flee.sprintSteps=3

# --- 5.3 Soi (Wolf) — san bay dan (Tho, Huou), chiu doi tot, tron Voi ---
animal.wolf.maxHp=100.0
animal.wolf.nutrition=30.0
animal.wolf.hungerDecay=0.10
animal.wolf.thirstDecay=0.08
animal.wolf.maxAge=800.0
animal.wolf.maxSize=15.0
animal.wolf.combatPower=22.0
animal.wolf.vision=130.0
animal.wolf.speed=3.5
animal.wolf.eatRadius=6.0
# Di san: he so toc do khi duoi, nguong doi bat dau di san
animal.wolf.hunt.speedMultiplier=1.1
animal.wolf.hunt.hungerThreshold=50.0
animal.wolf.hunt.sprintSteps=3
# Predator sinh san cham hon thu an co: khong dung tran population, chi can bang chu ky sinh hoc.
animal.wolf.reproduce.chance=0.008
animal.wolf.reproduce.cooldownTicks=220

# --- 5.4 Ho (Tiger) — thu an thit dau bang, to xac, an it bua ma an nhieu ---
animal.tiger.maxHp=150.0
animal.tiger.nutrition=50.0
animal.tiger.hungerDecay=0.10
animal.tiger.thirstDecay=0.15
animal.tiger.maxAge=1000.0
animal.tiger.maxSize=20.0
animal.tiger.combatPower=45.0
animal.tiger.vision=150.0
animal.tiger.speed=4.0
animal.tiger.eatRadius=7.0
animal.tiger.hunt.speedMultiplier=1.2
animal.tiger.hunt.hungerThreshold=40.0
animal.tiger.hunt.sprintSteps=3
animal.tiger.reproduce.chance=0.005
animal.tiger.reproduce.cooldownTicks=300

# --- 5.5 Voi (Elephant) — APEX an co, mau cuc trau, cham; khong san ai (chi PassiveStrategy) ---
animal.elephant.maxHp=500.0
animal.elephant.nutrition=150.0
animal.elephant.hungerDecay=0.15
animal.elephant.thirstDecay=0.18
animal.elephant.maxAge=2500.0
animal.elephant.maxSize=50.0
animal.elephant.combatPower=25.0
animal.elephant.vision=200.0
animal.elephant.speed=1.5
animal.elephant.eatRadius=15.0
# Ban kinh than Voi nhu vat can sinh hoc; cac loai khac khong the di vao sat no.
animal.elephant.blockRadius=12.0

# --- 5.6 Ca (Fish) — an tao, KHONG khat (thirst=0), kho chet neu khong gap tham hoa ---
animal.fish.maxHp=60.0
animal.fish.nutrition=10.0
animal.fish.baseHpDrainPerTick=0.0
animal.fish.hungerDecay=0.12
animal.fish.thirstDecay=0.0
animal.fish.maxAge=5000.0
animal.fish.maxSize=2.0
animal.fish.combatPower=0.5
animal.fish.vision=80.0
animal.fish.speed=2.5
animal.fish.eatRadius=4.0
animal.fish.flee.speedMultiplier=1.6
animal.fish.flee.sprintSteps=2
# Sinh san rieng cua Ca: khong co tran quan the, chi phu thuoc cooldown/no doi/xac suat.
animal.fish.reproduce.chance=0.025
animal.fish.reproduce.cooldownTicks=80
animal.fish.reproduce.hungerThreshold=85.0

# --- 5.7 Tho san (Hunter) — san MOI loai (tru apex), sat thuong cao, mau thap, chiu khat kem ---
animal.hunter.maxHp=50.0
animal.hunter.nutrition=40.0
animal.hunter.hungerDecay=0.15
animal.hunter.thirstDecay=0.20
animal.hunter.maxAge=1500.0
animal.hunter.maxSize=18.0
animal.hunter.combatPower=15.0
animal.hunter.vision=250.0
animal.hunter.speed=3.0
animal.hunter.eatRadius=8.0
animal.hunter.hunt.speedMultiplier=1.3
animal.hunter.hunt.hungerThreshold=30.0
animal.hunter.hunt.sprintSteps=3


# ============================================================
#  6. THUC VAT (gom theo loai)
#   photosynthesisRate    : HP hoi moi tick khi quang hop
#   minLightLevel         : nguong anh sang toi thieu de quang hop
#   nutrientsAsorb/Absorb : ban kinh hut nuoc & dinh duong
#   (LUU Y: ten khoa giu nguyen chinh ta cu de khop code:
#    grass/appletree dung 'Asorb', treeforest dung 'Absorb')
# ============================================================

# --- 6.1 Co (Grass) ---
plant.grass.photosynthesisRate=2.0
plant.grass.minLightLevel=0.3
plant.grass.nutrientsAsorbRadius=10.0

# --- 6.2 Cay tao (AppleTree) — dinh ky rung tao (FoodType.APPLE) ---
plant.appletree.photosynthesisRate=1.5
plant.appletree.minLightLevel=0.4
plant.appletree.nutrientsAsorbRadius=15.0
# Chu ky rung tao (tick) va ban kinh rai tao quanh goc
plant.appletree.appleDropInterval=50
plant.appletree.appleDropRadius=20.0

# --- 6.3 Cay rung (TreeForest) — cay co thu, dinh ky rung qua ---
plant.treeforest.photosynthesisRate=2.0
plant.treeforest.minLightLevel=0.2
plant.treeforest.nutrientsAbsorbRadius=20.0
plant.treeforest.fruitDropInterval=80
plant.treeforest.fruitDropRadius=20.0

# --- 6.4 Tao (Algae) — Lake tu rai dinh ky lam thuc an cho Ca ---
# Moi 'spawnInterval' tick rai them 'spawnCount' cum tao
plant.algae.spawnInterval=10
plant.algae.spawnCount=15

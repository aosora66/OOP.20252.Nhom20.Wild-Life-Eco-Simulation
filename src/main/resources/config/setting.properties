# ============================================================
#  WILDLIFE ECO SIMULATION
# 1. So lieu dung chung trong lop Organism
# ============================================================

# Luong HP bi tru moi tick khi buoc vao giai doan lao hoa
organism.growth.decayHpPenalty=0.5

# Trao doi co ban moi tick (moi sinh vat)
organism.stats.baseHpDrainPerTick=0.1
organism.stats.thirstHumidityFactor=0.5
# Tru HP them khi nhiet do bat thuan (ngoai starvation penalty)
organism.stats.lethalStressHpPenalty=3.0
organism.stats.suboptimalStressHpPenalty=0.5
# Nguong (theo thang 100) ma sinh vat bat dau mat mau do doi/khat
organism.stats.hungerHpThreshold=80.0
organism.stats.thirstHpThreshold=85.0
# Luong mau (HP) bi mat moi tick khi muc doi/khat vuot qua nguong tren
organism.stats.hpPenaltyPerTick=2.0
# Ti le chuyen doi dinh duong sang mau
organism.stats.nutritionToHpRatio=0.3
# So tick cho giua hai lan phan khang cua ScaredStrategy (tranh spam moi tick)
organism.scared.counterAttackCooldown=20
# ============================================================
# 2. MOI TRUONG
# ============================================================

# ============================================================
# Moi truong - Thoi tiet & Mua (TimeComponent)
# ============================================================
environment.time.breeding.rainChance=0.40
environment.time.drought.droughtChance=0.60
environment.time.normal.rainChance=0.15
environment.time.normal.droughtChance=0.10

environment.multiplier.season.breeding=0.8
environment.multiplier.season.drought=1.5
environment.multiplier.weather.rain=0.7
environment.multiplier.weather.drought=1.4

# ============================================================
# Moi truong - Dia hinh (TerrainComponent)
# ============================================================
environment.terrain.visibility.reduced=0.3
environment.terrain.visibility.normal=1.0
environment.terrain.tileSize=50.0

# Luong toc do bi tru di (x) khi di vao cac dia hinh
environment.terrain.penalty.shallow_water=2.0
environment.terrain.penalty.forest=1.5
environment.terrain.penalty.forest.wolf=0.5
# ============================================================
# Moi truong - Tai nguyen & Xu ly su kien
# ============================================================
environment.meat.expiryTicks=30
environment.light.day=1.0
environment.light.night=0.2
# So tick mac dinh cho 1 chu ky ngay dem va 1 mua (CompositeMap)
environment.time.ticksPerDayCycle=24
environment.time.ticksPerSeason=240

# ============================================================
#  Food Resources
# ============================================================
food.meat.nutritionalValue=25.0
food.apple.nutritionalValue=5.0
food.water.nutritionalValue=20.0
food.apple.expiryTicks=100


# ============================================================
#  Animal Stats
# ============================================================
animal.rabbit.combatPower=1.0
animal.rabbit.vision=100.0
animal.rabbit.speed=2.0
animal.rabbit.eatRadius=5.0

animal.tiger.combatPower=10.0
animal.tiger.vision=150.0
animal.tiger.speed=4.0
animal.tiger.eatRadius=7.0

animal.deer.combatPower=2.0
animal.deer.vision=120.0
animal.deer.speed=3.0
animal.deer.eatRadius=6.0

animal.wolf.combatPower=6.0
animal.wolf.vision=130.0
animal.wolf.speed=3.5
animal.wolf.eatRadius=6.0

# ============================================================
#  Behavioral Parameters
# ============================================================
# Reproduction Parameters
plant.reproduce.hungerThreshold=80.0
plant.reproduce.chance=0.01
plant.reproduce.offspringCount=1
plant.reproduce.spawnRadius=20.0

animal.reproduce.hungerThreshold=40.0
animal.reproduce.thirstThreshold=40.0
animal.reproduce.chance=0.02
animal.reproduce.cooldownTicks=100

# Rabbit Behavior
animal.rabbit.flee.speedMultiplier=1.5
animal.rabbit.flee.sprintSteps=2

# Deer Behavior
animal.deer.flee.speedMultiplier=1.4
animal.deer.flee.sprintSteps=3

# Tiger Behavior
animal.tiger.hunt.speedMultiplier=1.2
animal.tiger.hunt.hungerThreshold=40.0

# Wolf Behavior
animal.wolf.hunt.speedMultiplier=1.1
animal.wolf.hunt.hungerThreshold=50.0

# ============================================================
#  Plant Parameters
# ============================================================
plant.grass.photosynthesisRate=2.0
plant.grass.minLightLevel=0.3
plant.grass.nutrientsAsorbRadius=10.0

plant.appletree.photosynthesisRate=1.5
plant.appletree.minLightLevel=0.4
plant.appletree.nutrientsAsorbRadius=15.0
plant.appletree.appleDropInterval=50
plant.appletree.appleDropRadius=20.0

# ============================================================
#  TreeForest Parameters
# ============================================================
plant.treeforest.photosynthesisRate=2.0
plant.treeforest.minLightLevel=0.2
plant.treeforest.nutrientsAbsorbRadius=20.0
plant.treeforest.fruitDropInterval=80
plant.treeforest.fruitDropRadius=20.0
food.treeforest.nutritionalValue=7.0
food.treeforest.expiryTicks=80

# ============================================================
#  Elephant Stats & Behavior
# ============================================================
animal.elephant.combatPower=25.0
animal.elephant.vision=200.0
animal.elephant.speed=1.5
animal.elephant.eatRadius=15.0

# ============================================================
#  Hunter Stats & Behavior
# ============================================================
# Mat mau cao, chiu khat kem (thirstDecayRate dinh nghia qua SurvivalStatsComponent)
animal.hunter.combatPower=15.0
animal.hunter.vision=250.0
animal.hunter.speed=3.0
animal.hunter.eatRadius=8.0
animal.hunter.hunt.speedMultiplier=1.3
animal.hunter.hunt.hungerThreshold=30.0
